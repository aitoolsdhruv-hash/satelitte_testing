name: Sync to Hugging Face
on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true
      - name: Install huggingface_hub
        run: pip install huggingface_hub
      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python -c "
          from huggingface_hub import HfApi
          import os
          token = os.environ.get('HF_TOKEN')
          if not token:
              print('HF_TOKEN missed')
              exit(1)
          api = HfApi(token=token)
          print('Starting upload to Dhruvk14/Satellite_scheduler_updated...')
          api.upload_folder(
              folder_path='.',
              repo_id='Dhruvk14/Satellite_scheduler_updated',
              repo_type='space',
              delete_patterns=['*.pyc', '__pycache__', '.git/*']
          )
          "
