# openenv.yaml  (project root — required for openenv validate)
#
# This file is the machine-readable manifest for the OpenEnv registry.
# It must be present at the project root and pass:
#   openenv validate
#
# HF Spaces reads the README.md YAML block for Space config (see README.md).
# This file is for the OpenEnv CLI and judge pipeline specifically.

name: satellite-downlink-scheduler
version: "1.2.0"
author: "Dhruvk14"
repository: "https://huggingface.co/spaces/Dhruvk14/Satellite_Scheduler"
license: "mit"

description: >
  A high-concurrency simulation of a 15-satellite fleet with 6 ground stations
  supporting the "OpenEnv Batch Protocol". 
  Features dynamic weather dropouts, 100 Mbps bandwidth contention,
  and emergency 8-burst clusters.
  The agent must coordinate multiple simultaneous contact windows per tick
  to maximize priority-weighted data download.

tags:
  - openenv
  - scheduling
  - satellite
  - real-world
  - multi-agent
  - planning
  - resource-allocation

# ── Environment interface ─────────────────────────────────────

action_space:
  type: discrete-structured
  description: >
    Consolidated Batch Actions. respond with EXACTLY ONE JSON object:
    schedule_multiple or noop.
  actions:
    - name: schedule_multiple
      description: Assign multiple satellite-station windows in a single step
      fields:
        schedules: "List[Dict] — array of {sat_id, station_id, window_id}"

    - name: noop
      description: Advance the clock with no assignment change
      fields: {}

observation_space:
  type: structured
  fields:
    current_time_min:
      type: int
      range: "[0, 1440]"
      description: Minutes elapsed since episode start

    pass_windows:
      type: "List[PassWindowModel]"
      description: >
        Upcoming contact windows within a 4-hour lookahead.
        Each window has: window_id, satellite_id, station_id, tick,
        duration_s, max_rate_mbps, elevation_deg, link_quality, max_bytes.

    station_availability:
      type: "Dict[str, float]"
      range: "[0.0, 1.0]"
      description: >
        Current weather multiplier per station. Resampled every 30 minutes
        from Beta(5,2). Always 1.0 for task1 (clear sky).

    satellite_buffer_bytes:
      type: "Dict[str, int]"
      description: Remaining bytes in each satellite's on-board storage.

    data_priority_queues:
      type: "Dict[str, List[DataChunkModel]]"
      description: >
        Queued data chunks per satellite, including priority (1-3)
        and deadlines for Task 3 triage.

    reward_obj:
      type: "RewardModel"
      description: Detailed reward breakdown with value and metadata.

    current_schedule:
      type: "List[ScheduleEntryModel]"
      description: Active station assignments scheduled for the current tick.

# ── Submission Evaluation Tasks ─────────────────────────────

tasks:
  - name: task1
    description: Baseline scheduling (clear weather, 85 chunks/sat, 0 emergencies)
    grader: src.envs.satellite_env.server.graders:grade
    seed: 42

  - name: task2
    description: Weather resilience (dynamic station availability, 85 chunks/sat)
    grader: src.envs.satellite_env.server.graders:grade
    seed: 42

  - name: task3
    description: Full operations (weather + 8 high-priority emergency injections)
    grader: src.envs.satellite_env.server.graders:grade
    seed: 42